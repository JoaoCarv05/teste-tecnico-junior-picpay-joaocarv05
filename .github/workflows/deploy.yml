name: Deploy to ECR

on:
  workflow_dispatch:
    inputs:
      image_version:
        description: 'Versão da imagem (ex: v1.0.0, 1.2.3)'
        required: true
        default: 'v1.0.0'
        type: string

jobs:
  deploy:
    name: Deploy to ECR
    runs-on: ubuntu-latest
    
    # Permissões necessárias para OIDC
    permissions:
      id-token: write
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::436820054705:role/GitHubActions-ContainerRegistry-Role
        aws-region: ${{ vars.AWS_REGION }}
        role-session-name: GitHubActions-ECR-Push
    
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2
    
    - name: Build, tag, and push image to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}  # ← Usando variável do GitHub
        IMAGE_VERSION: ${{ github.event.inputs.image_version }}
        AWS_REGION: ${{ vars.AWS_REGION }}
      run: |
        echo "🚀 Building image with version: $IMAGE_VERSION"
        echo "🌍 Using AWS Region: $AWS_REGION"
        echo "📦 Using ECR Repository: $ECR_REPOSITORY"
        
        # Build da imagem Docker
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_VERSION .
        
        # Se não for 'latest', também taga como latest
        if [ "$IMAGE_VERSION" != "latest" ]; then
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
        fi
        
        # Push da imagem para ECR
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_VERSION
        
        # Push do latest se não for a versão latest
        if [ "$IMAGE_VERSION" != "latest" ]; then
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
        fi
        
        echo "✅ Image pushed successfully!"
        echo "📦 Image: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_VERSION"
        echo "🌍 Region: $AWS_REGION"
